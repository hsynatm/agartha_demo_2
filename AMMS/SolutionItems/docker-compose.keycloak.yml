
services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: amms-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_HTTP_PORT: 8080
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/amms-realm.json:/opt/keycloak/data/import/amms-realm.json:ro
